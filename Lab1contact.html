    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Student Portal</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <!-- Contact Us Header -->
    <header>
        <h1>Contact Us</h1>
        <p>We're here to help. Reach out to us with any questions or concerns.</p>
    </header>

 <div class="navbar">
        <a href="index.html">Home</a>
    </div>
    <!-- Contact Form Section -->
    <section class="contact-form">
        <div class="container">
            <h2>Get in Touch</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn">Submit</button>
            </form>
        </div>
    </section>

    <!-- Contact Location Section -->
    <section class="contact-location">
        <div class="container">
            <h3>Our Location</h3>
            <p>Visit us at the address below:</p>
            <p>Survey No, 124, Paud Rd, Kothrud, Pune, Maharashtra 411038</p>

</body>
